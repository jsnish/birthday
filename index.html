<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Nimmy akka 🎉</title>

  <style>
    body{
      margin:0;
      text-align:center;
      font-family:Arial;
      background:linear-gradient(135deg,#ff6a00,#ee0979);
      color:white;
      overflow:hidden;
    }
    .content{
      position:relative;
      z-index:5; /* content above canvas */
      padding:20px;
    }
    h1{ margin-top:20px; font-size:30px; }
    img{
      width:90%;
      max-width:350px;
      border-radius:20px;
      margin-top:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }
    button{
      padding:12px 18px;
      font-size:16px;
      border:none;
      border-radius:10px;
      margin:10px;
      background:white;
      color:#ee0979;
      font-weight:bold;
      cursor:pointer;
    }
    p{ font-size:18px; line-height:1.4; margin:14px 12px 0; }
    .hint{ font-size:12px; opacity:0.9; margin-top:8px; }

    canvas{
      position:fixed;
      top:0; left:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:0; /* canvas behind */
    }
  </style>
</head>

<body>
  <canvas id="fx"></canvas>

  <div class="content">
    <h1>🎂 Happy Birthday Nimmy akka 🎉</h1>

    <img src="nimmy.jpg" alt="Nimmy akka">

    <p>
      Wishing you a day filled with happiness, love and beautiful memories. <br>
      May this year bring you success, health and endless smiles. ✨
    </p>

    <button onclick="playMusic()">🎵 Play Music</button>
    <button onclick="celebrate()">🎊 Celebrate</button>

    <div class="hint">Tip: Click anywhere for extra fireworks ✨</div>

    <audio id="music" src="birthday.mp3"></audio>
  </div>

<script>
  const canvas = document.getElementById("fx");
  const ctx = canvas.getContext("2d");

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  function rand(min,max){ return Math.random()*(max-min)+min; }
  function pick(arr){ return arr[(Math.random()*arr.length)|0]; }
  const COLORS = ["#ff3b3b","#ffd93b","#3bff5a","#3bbcff","#c33bff","#ffffff","#ff8a00"];

  let confetti = [];
  let sparks = [];

  function confettiBurst(x,y){
    for(let i=0;i<160;i++){
      confetti.push({
        x,y,
        vx: rand(-4,4),
        vy: rand(-8,-2),
        g: 0.18,
        r: rand(2,5),
        color: pick(COLORS),
        life: rand(60,130)
      });
    }
  }

  function fireworkBurst(x,y){
    const color = pick(COLORS);
    for(let i=0;i<140;i++){
      const a = Math.random()*Math.PI*2;
      const sp = rand(2,7);
      sparks.push({
        x,y,
        vx: Math.cos(a)*sp,
        vy: Math.sin(a)*sp,
        g: 0.06,
        r: rand(1.5,3),
        color,
        life: rand(40,90)
      });
    }
  }

  function loop(){
    ctx.fillStyle = "rgba(0,0,0,0.18)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let i=confetti.length-1;i>=0;i--){
      const p = confetti[i];
      p.life--;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.g;

      ctx.globalAlpha = Math.max(0, Math.min(1, p.life/90));
      ctx.beginPath();
      ctx.fillStyle = p.color;
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;

      if(p.life<=0 || p.y>canvas.height+30) confetti.splice(i,1);
    }

    for(let i=sparks.length-1;i>=0;i--){
      const s = sparks[i];
      s.life--;
      s.x += s.vx;
      s.y += s.vy;
      s.vy += s.g;
      s.vx *= 0.985;
      s.vy *= 0.985;

      ctx.globalAlpha = Math.max(0, Math.min(1, s.life/70));
      ctx.beginPath();
      ctx.fillStyle = s.color;
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;

      if(s.life<=0) sparks.splice(i,1);
    }

    requestAnimationFrame(loop);
  }
  loop();
function celebrate(){
    const x = window.innerWidth/2;
    const y = window.innerHeight*0.35;
    confettiBurst(x,y);
    fireworkBurst(x,y);
    setTimeout(()=>fireworkBurst(window.innerWidth*0.25, y), 200);
    setTimeout(()=>fireworkBurst(window.innerWidth*0.75, y), 350);
  }

  document.addEventListener("pointerdown", (e)=>{
    confettiBurst(e.clientX, e.clientY);
    fireworkBurst(e.clientX, e.clientY);
  }, {passive:true});

  function playMusic(){
    const a = document.getElementById("music");
    a.play();
    a.loop = true;   // 🔁 keep playing
    celebrate();
  }

  // small celebration on load
  setTimeout(celebrate, 300);
</script>

</body>
</html>
